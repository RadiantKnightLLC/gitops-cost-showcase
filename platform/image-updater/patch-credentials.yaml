apiVersion: apps/v1
kind: Deployment
metadata:
  name: argocd-image-updater
spec:
  template:
    spec:
      containers:
        - name: argocd-image-updater
          env:
            # Git configuration for write-back
            - name: GIT_USER
              value: "Argo CD Image Updater"
            - name: GIT_EMAIL
              value: "argocd-image-updater@example.com"
            # GitHub token for PR creation (production)
            # This should be stored as a Kubernetes secret
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: image-updater-git-credentials
                  key: github-token
                  optional: true
          volumeMounts:
            - name: git-credentials
              mountPath: /app/config/git
              readOnly: true
      volumes:
        - name: git-credentials
          secret:
            secretName: image-updater-git-credentials
            optional: true
