# NGINX Ingress Controller - Basic installation
# For production, consider using Helm chart instead
apiVersion: v1
kind: Namespace
metadata:
  name: ingress-system
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
  labels:
    environment: platform
    team: platform
    cost-center: shared-overhead
    owner: platform-team
---
# NOTE: This is a placeholder for NGINX Ingress Controller
# For a real installation, use the Helm chart:
#
# helm repo add ingress-nginx https://kubernetes.github.io/ingress-nginx
# helm repo update
# helm install ingress-nginx ingress-nginx/ingress-nginx \
#   --namespace ingress-system \
#   --set controller.replicaCount=2 \
#   --set controller.resources.requests.cpu=100m \
#   --set controller.resources.requests.memory=128Mi
#
# Or use Argo CD Application with Helm source
