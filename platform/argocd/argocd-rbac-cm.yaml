apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-rbac-cm
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
data:
  policy.default: role:readonly
  policy.csv: |
    # Admins - full access
    p, role:admin, applications, *, */*, allow
    p, role:admin, clusters, *, *, allow
    p, role:admin, repositories, *, *, allow
    p, role:admin, projects, *, *, allow

    # Platform engineers - can sync and manage apps, cannot delete clusters
    p, role:platform-eng, applications, get, */*, allow
    p, role:platform-eng, applications, sync, */*, allow
    p, role:platform-eng, applications, update, */*, allow
    p, role:platform-eng, applications, override, */*, allow
    p, role:platform-eng, repositories, get, *, allow
    p, role:platform-eng, projects, get, *, allow

    # FinOps reviewers - read only for cost correlation
    p, role:finops-reviewer, applications, get, */*, allow
    p, role:finops-reviewer, repositories, get, *, allow
    p, role:finops-reviewer, projects, get, *, allow

    # Group bindings (adjust to match your IdP groups)
    g, platform-team, role:platform-eng
    g, finops-team, role:finops-reviewer
    g, admin-team, role:admin
