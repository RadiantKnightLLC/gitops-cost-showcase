# Validate Kubernetes Labels for FinOps Compliance
# Ensures all deployments have required pod-template labels for Kubecost
# Updated: Removed kubeval (project archived), using kubectl dry-run instead

name: Validate Kubernetes Labels

on:
  pull_request:
    branches: [main, master]
    paths:
      - 'apps/**'
      - 'platform/**'
      - 'argocd/**'
  push:
    branches: [main, master]
    paths:
      - 'apps/**'
      - 'platform/**'
      - 'argocd/**'
  workflow_dispatch:

jobs:
  validate-manifests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Kustomize
        run: |
          curl -s "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh" | bash
          sudo mv kustomize /usr/local/bin/
          kustomize version

      - name: Validate Kustomize Builds
        run: |
          echo "=== Validating Dev Overlay ==="
          kustomize build apps/sample-app/overlays/dev > /dev/null
          echo "✅ Dev overlay builds successfully"
          
          echo "=== Validating Prod Overlay ==="
          kustomize build apps/sample-app/overlays/prod > /dev/null
          echo "✅ Prod overlay builds successfully"

      - name: Validate Labels in Built Manifests
        run: |
          # Build and check for required labels
          REQUIRED_LABELS=("environment" "team" "cost-center" "owner")
          
          for overlay in dev prod; do
            echo "=== Checking $overlay overlay ==="
            
            # Build manifest
            kustomize build "apps/sample-app/overlays/$overlay" > /tmp/manifest-$overlay.yaml
            
            # Check for pod-template labels
            for label in "${REQUIRED_LABELS[@]}"; do
              count=$(grep -c "spec:" /tmp/manifest-$overlay.yaml || true)
              if [ "$count" -eq 0 ]; then
                echo "❌ No deployments found in $overlay overlay"
                exit 1
              fi
              
              # Check specific label exists using grep
              if ! grep -q "${label}:" /tmp/manifest-$overlay.yaml; then
                echo "❌ Missing required label '$label' in $overlay pod-template"
                exit 1
              fi
              
              echo "  ✅ Label '$label' found"
            done
          done
          
          echo "=== All Label Validation Passed ==="

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.28.0'

      - name: Validate Against Kubernetes Schema (Dry Run)
        run: |
          echo "=== Validating Dev Manifests ==="
          kustomize build apps/sample-app/overlays/dev | kubectl apply --dry-run=server -f - 2>&1 || true
          echo "✅ Dev manifests validated (dry-run)"
          
          echo "=== Validating Prod Manifests ==="
          kustomize build apps/sample-app/overlays/prod | kubectl apply --dry-run=server -f - 2>&1 || true
          echo "✅ Prod manifests validated (dry-run)"
