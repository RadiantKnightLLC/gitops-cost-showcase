# Security Scanning Workflow
# Scans container images and manifests for vulnerabilities
---
name: Security Scan

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    # Run daily at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:

env:
  # Fail on HIGH and CRITICAL vulnerabilities
  SEVERITY_LEVEL: HIGH,CRITICAL
  # Images to scan (update as needed)
  SCAN_IMAGES: |
    ghcr.io/radiantknightllc/showcase-app-p1:latest
    nginx:alpine

jobs:
  # Job 1: Scan Kubernetes manifests
  scan-manifests:
    name: Scan Kubernetes Manifests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner (manifests)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'config'
          scan-ref: '.'
          severity: ${{ env.SEVERITY_LEVEL }}
          exit-code: '1'
          format: 'sarif'
          output: 'trivy-manifests.sarif'

      - name: Upload SARIF results
        if: always()
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: 'trivy-manifests.sarif'
          category: 'trivy-manifests'

  # Job 2: Scan container images
  scan-images:
    name: Scan Container Images
    runs-on: ubuntu-latest
    strategy:
      matrix:
        image: 
          - ghcr.io/radiantknightllc/showcase-app-p1:latest
          - nginx:alpine
      fail-fast: false
    steps:
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ matrix.image }}
          severity: ${{ env.SEVERITY_LEVEL }}
          exit-code: '1'
          format: 'sarif'
          output: 'trivy-image.sarif'

      - name: Upload SARIF results
        if: always()
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: 'trivy-image.sarif'
          category: 'trivy-image-${{ matrix.image }}'

      - name: Generate scan report
        if: always()
        run: |
          echo "## Security Scan Results for ${{ matrix.image }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Run Trivy again for table output to summary
          docker run --rm aquasec/trivy:latest image \
            --severity ${{ env.SEVERITY_LEVEL }} \
            --exit-code 0 \
            --format table \
            ${{ matrix.image }} 2>/dev/null | head -50 >> $GITHUB_STEP_SUMMARY || true

  # Job 3: Secret scanning
  scan-secrets:
    name: Secret Detection
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

      - name: Run TruffleHog
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --debug --only-verified

  # Job 4: Check for misconfigurations
  checkov-scan:
    name: Checkov Misconfiguration Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Checkov
        uses: bridgecrewio/checkov-action@master
        with:
          directory: .
          framework: kubernetes
          output_format: sarif
          output_file_path: reports/checkov.sarif
          soft_fail: true

      - name: Upload Checkov SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: reports/checkov.sarif
          category: 'checkov'

  # Summary job
  security-summary:
    name: Security Summary
    runs-on: ubuntu-latest
    needs: [scan-manifests, scan-images, scan-secrets, checkov-scan]
    if: always()
    steps:
      - name: Generate summary
        run: |
          echo "# Security Scan Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Scan Type | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Manifest Scan | ${{ needs.scan-manifests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Image Scan | ${{ needs.scan-images.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Secret Detection | ${{ needs.scan-secrets.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Misconfiguration | ${{ needs.checkov-scan.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [[ "${{ needs.scan-manifests.result }}" == "success" && \
                "${{ needs.scan-images.result }}" == "success" && \
                "${{ needs.scan-secrets.result }}" == "success" ]]; then
            echo "✅ All critical security checks passed" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Some security checks failed" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
