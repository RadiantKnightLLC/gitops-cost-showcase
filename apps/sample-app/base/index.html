<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic-Tac-Toe - GitOps-FinOps Showcase</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }
    .container {
      text-align: center;
      padding: 2rem;
      background: rgba(255,255,255,0.1);
      border-radius: 16px;
      backdrop-filter: blur(10px);
      box-shadow: 0 8px 32px rgba(0,0,0,0.1);
    }
    h1 {
      margin: 0 0 1rem 0;
      font-size: 2.5rem;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(3, 100px);
      gap: 10px;
      margin: 2rem auto;
    }
    .cell {
      width: 100px;
      height: 100px;
      background: rgba(255,255,255,0.2);
      border-radius: 12px;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 3rem;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    .cell:hover {
      background: rgba(255,255,255,0.3);
      transform: scale(1.05);
    }
    .status {
      font-size: 1.2rem;
      margin-top: 1rem;
      padding: 0.5rem 1rem;
      background: rgba(255,255,255,0.15);
      border-radius: 8px;
      display: inline-block;
    }
    .env-badge {
      position: absolute;
      top: 1rem;
      right: 1rem;
      padding: 0.5rem 1rem;
      background: rgba(255,255,255,0.2);
      border-radius: 20px;
      font-size: 0.875rem;
    }
  </style>
</head>
<body>
  <div class="env-badge" id="env">ENVIRONMENT</div>
  <div class="container">
    <h1>🎮 Tic-Tac-Toe</h1>
    <div class="grid">
      <div class="cell">X</div>
      <div class="cell">O</div>
      <div class="cell">X</div>
      <div class="cell">O</div>
      <div class="cell">X</div>
      <div class="cell"></div>
      <div class="cell"></div>
      <div class="cell"></div>
      <div class="cell">O</div>
    </div>
    <div class="status">Player X's turn</div>
    <p style="margin-top: 2rem; opacity: 0.8;">
      GitOps-FinOps Showcase<br>
      <small>Deployed via ArgoCD ApplicationSet</small>
    </p>
  </div>
  <script>
    // Simple env display
    const hostname = window.location.hostname;
    const port = window.location.port;
    const env = port === '8081' ? 'DEV' : 
               port === '8082' ? 'PROD' : 'UNKNOWN';
    document.getElementById('env').textContent = env + ' ENVIRONMENT';
  </script>
</body>
</html>
