apiVersion: v1
kind: ConfigMap
metadata:
  name: sample-app-config
  labels:
    app.kubernetes.io/name: sample-app
    app.kubernetes.io/part-of: gitops-finops-showcase
data:
  # Application configuration
  LOG_LEVEL: "info"
  METRICS_ENABLED: "true"
  # Feature flags
  FEATURE_ADVANCED_METRICS: "false"
  FEATURE_COST_REPORTING: "true"
  # Kubecost integration
  KUBECOST_INTEGRATION: "enabled"
