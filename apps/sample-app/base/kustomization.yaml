apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
- deployment.yaml
- service.yaml
# Common labels applied to all resources
# These are merged with any labels defined in individual resources
# Common annotations
commonAnnotations:
  argocd.argoproj.io/sync-options: Prune=false
  argocd.argoproj.io/sync-wave: "2"
# Images will be updated by Argo CD Image Updater
# Format: name=newName:newTag
images:
- name: showcase-app-p1
  newName: ghcr.io/radiantknightllc/showcase-app-p1
  newTag: latest
labels:
- includeSelectors: true
  pairs:
    app.kubernetes.io/managed-by: argocd
    app.kubernetes.io/part-of: gitops-finops-showcase
