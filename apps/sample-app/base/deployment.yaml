apiVersion: apps/v1
kind: Deployment
metadata:
  name: sample-app
  labels:
    app.kubernetes.io/name: sample-app
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: gitops-finops-showcase
    # NOTE: Additional labels are added by overlays at both metadata and pod-template levels
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: sample-app
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sample-app
        app.kubernetes.io/component: api
        app.kubernetes.io/part-of: gitops-finops-showcase
        # CRITICAL: Additional labels (environment, team, cost-center, owner) 
        # are added by overlays in spec.template.metadata.labels
        # This is required for Kubecost cost allocation!
    spec:
      volumes:
        - name: app-content
          configMap:
            name: sample-app-content
      containers:
        - name: sample-app
          image: nginx:alpine
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          volumeMounts:
            - name: app-content
              mountPath: /usr/share/nginx/html
              readOnly: true
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
