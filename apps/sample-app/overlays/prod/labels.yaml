# CRITICAL: This patch adds required labels to the POD TEMPLATE
# Kubecost reads labels from running pods (spec.template.metadata.labels)
# NOT from Deployment metadata alone!
#
# Production requires the same labels as dev, with environment=prod
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sample-app
spec:
  template:
    metadata:
      labels:
        # These labels are REQUIRED for Kubecost cost allocation
        environment: prod
        team: platform
        cost-center: agency-rnd
        owner: agency-internal
        # Additional metadata
        app.kubernetes.io/instance: sample-app-prod
        app.kubernetes.io/version: "1.0.0"
        service-tier: production
