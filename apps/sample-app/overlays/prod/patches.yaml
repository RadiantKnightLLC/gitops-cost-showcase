apiVersion: apps/v1
kind: Deployment
metadata:
  name: sample-app
spec:
  replicas: 2  # Higher replica count for production
  template:
    spec:
      containers:
        - name: sample-app
          resources:
            requests:
              memory: "128Mi"  # Higher for prod
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"
