apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: sample-app-prod
namePrefix: prod-
resources:
- namespace.yaml
- ../../base
# Labels applied to all resources in this overlay
# Images - Argo CD Image Updater will modify this via PR
images:
- name: ghcr.io/RadiantKnightLLC/sample-app
  newName: nginx
  newTag: alpine
labels:
- includeSelectors: true
  pairs:
    cost-center: agency-rnd
    environment: prod
    owner: agency-internal
    team: platform
patches:
- path: labels.yaml
- path: patches.yaml

