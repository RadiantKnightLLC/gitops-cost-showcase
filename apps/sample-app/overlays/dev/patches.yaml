apiVersion: apps/v1
kind: Deployment
metadata:
  name: sample-app
spec:
  replicas: 1
  template:
    spec:
      containers:
        - name: sample-app
          resources:
            requests:
              memory: "64Mi"   # Lower for dev
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"
