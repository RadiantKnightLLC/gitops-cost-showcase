apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: sample-app
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    # Git generator - discovers environments from directory structure
    - git:
        repoURL: https://github.com/RadiantKnightLLC/gitops-cost-showcase.git
        revision: master
        directories:
          - path: apps/sample-app/overlays/*
  template:
    metadata:
      name: 'sample-app-{{ .path.basename }}'
      annotations:
        argocd.argoproj.io/sync-wave: "2"
        # Image Updater: Track showcase-app-p1 image
        # Format: <alias>=<full-image-path>
        argocd-image-updater.argoproj.io/image-list: >-
          sample-app=ghcr.io/radiantknightllc/showcase-app-p1
        # Update strategy: newest-build for latest image
        argocd-image-updater.argoproj.io/sample-app.update-strategy: newest-build
        # Allow tags pattern
        argocd-image-updater.argoproj.io/sample-app.allow-tags: "sha-*,v*"
        # Write back to Git (requires IMAGE_UPDATER_TOKEN secret)
        argocd-image-updater.argoproj.io/write-back-method: git:secret:argocd/image-updater-git-credentials
        argocd-image-updater.argoproj.io/git-branch: master
      finalizers:
        - resources-finalizer.argocd.argoproj.io
    spec:
      project: default
      source:
        repoURL: https://github.com/RadiantKnightLLC/gitops-cost-showcase.git
        targetRevision: master
        path: '{{ .path.path }}'
      destination:
        server: https://kubernetes.default.svc
        namespace: 'sample-app-{{ .path.basename }}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - PrunePropagationPolicy=foreground
          - PruneLast=true
        retry:
          limit: 5
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 3m
      ignoreDifferences:
        - group: apps
          kind: Deployment
          jsonPointers:
            - /spec/replicas
  # Post-rendered patch for environment-specific sync policies
  strategy:
    type: RollingSync
    rollingSync:
      steps:
        - matchExpressions:
            - key: environment
              operator: In
              values:
                - dev
          maxUpdate: 100%
        - matchExpressions:
            - key: environment
              operator: In
              values:
                - prod
          maxUpdate: 50%
